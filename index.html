<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Prueba — Visitas y Amenidades</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
body { font-family:'Segoe UI',Arial,sans-serif; background:#f0f2f5; color:#222; min-height:100vh; }
.screen { display:none; min-height:100vh; flex-direction:column; }
.screen.active { display:flex; }

/* Header */
.app-header { background:linear-gradient(135deg,#1565c0,#1976d2); color:#fff;
  padding:16px 20px 14px; display:flex; align-items:center; gap:12px;
  box-shadow:0 2px 8px rgba(0,0,0,.15); }
.app-header .back { background:none; border:none; color:#fff; font-size:22px;
  cursor:pointer; padding:4px; }
.app-header .header-title h1 { font-size:17px; font-weight:700; }
.app-header .header-title p  { font-size:12px; opacity:.85; margin-top:2px; }

.content { flex:1; padding:16px; max-width:480px; width:100%; margin:0 auto; overflow-y:auto; }

/* Cards */
.card { background:#fff; border-radius:16px; padding:20px;
  box-shadow:0 2px 10px rgba(0,0,0,.08); margin-bottom:16px; }
.card-title { font-size:16px; font-weight:700; color:#1565c0; margin-bottom:16px; }

/* Forms */
.fg { margin-bottom:14px; }
.fg label { display:block; font-size:13px; color:#666; margin-bottom:6px; font-weight:500; }
.fg input, .fg select { width:100%; padding:13px 14px; border:1.5px solid #ddd;
  border-radius:10px; font-size:15px; background:#fff; outline:none;
  transition:border-color .2s; }
.fg input:focus, .fg select:focus { border-color:#1976d2; }

/* Botones */
.btn-submit { background:linear-gradient(135deg,#1565c0,#1976d2); color:#fff;
  border:none; border-radius:12px; padding:15px; width:100%; font-size:16px;
  font-weight:700; cursor:pointer; margin-top:4px; transition:transform .15s; }
.btn-submit:active { transform:scale(.98); }
.btn-submit:disabled { opacity:.6; cursor:not-allowed; }

/* Mensajes */
.msg { border-radius:10px; padding:12px 14px; margin-bottom:14px;
  font-size:14px; display:none; }
.msg.show { display:block; }
.msg.ok    { background:#e8f5e9; color:#2e7d32; }
.msg.error { background:#ffebee; color:#c62828; }
.msg.info  { background:#e3f2fd; color:#1565c0; }

/* ── Menú de prueba ─────────────────────────────── */
#s-menu { flex-direction:column; }
.menu-info { background:linear-gradient(135deg,#1565c0,#1976d2);
  border-radius:16px; padding:16px 20px; color:#fff; margin-bottom:16px; }
.menu-info p { font-size:13px; opacity:.85; }
.menu-info h2 { font-size:17px; font-weight:700; margin-top:4px; }

.mod-grid { display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-bottom:16px; }
.mod-btn { background:#fff; border:none; border-radius:14px; padding:20px 12px;
  text-align:center; cursor:pointer; box-shadow:0 2px 8px rgba(0,0,0,.08);
  transition:transform .15s; }
.mod-btn:active { transform:scale(.96); }
.mod-btn .m-icon  { font-size:32px; display:block; margin-bottom:8px; }
.mod-btn .m-title { font-size:13px; font-weight:700; color:#333; display:block; }
.mod-btn .m-desc  { font-size:11px; color:#888; margin-top:3px; }

/* ── VISITAS ─────────────────────────────────────── */
.visita-card { background:#f8f9fa; border-radius:10px; padding:12px 14px;
  margin-bottom:8px; border-left:3px solid #1976d2; }
.visita-card .vc-nombre { font-size:14px; font-weight:600; color:#333; }
.visita-card .vc-meta   { font-size:12px; color:#888; margin-top:3px; }
.visita-card .vc-hora   { font-size:13px; color:#1976d2; font-weight:600; margin-top:4px; }

/* ── AMENIDADES ──────────────────────────────────── */
.amenidad-card { background:#fff; border-radius:14px; padding:16px;
  margin-bottom:12px; box-shadow:0 2px 8px rgba(0,0,0,.08);
  border:2px solid transparent; transition:border-color .2s; }
.amenidad-card.libre   { border-color:#43a047; }
.amenidad-card.ocupada { border-color:#e53935; }
.amenidad-card.palapa  { border-color:#fb8c00; }

.am-header { display:flex; align-items:center; justify-content:space-between; margin-bottom:10px; }
.am-nombre { font-size:15px; font-weight:700; color:#333; }
.am-badge { font-size:11px; font-weight:700; padding:4px 10px; border-radius:20px; }
.am-badge.libre   { background:#e8f5e9; color:#2e7d32; }
.am-badge.ocupada { background:#ffebee; color:#c62828; }
.am-badge.palapa  { background:#fff3e0; color:#e65100; }

.am-info { font-size:12px; color:#888; margin-bottom:12px; min-height:16px; }
.am-info strong { color:#555; }

/* Barra de aforo */
.aforo-bar-wrap { margin-bottom:12px; }
.aforo-label { display:flex; justify-content:space-between; font-size:12px;
  color:#666; margin-bottom:5px; }
.aforo-bar { background:#eee; border-radius:6px; height:8px; overflow:hidden; }
.aforo-fill { height:100%; border-radius:6px; transition:width .4s;
  background:linear-gradient(90deg,#43a047,#66bb6a); }
.aforo-fill.lleno { background:linear-gradient(90deg,#e53935,#ef5350); }
.aforo-fill.casi  { background:linear-gradient(90deg,#fb8c00,#ffa726); }

/* Switch ocupar/liberar */
.am-actions { display:flex; gap:8px; }
.btn-ocupar  { flex:1; background:#1976d2; color:#fff; border:none;
  border-radius:10px; padding:12px; font-size:14px; font-weight:700;
  cursor:pointer; transition:transform .15s; }
.btn-ocupar:active  { transform:scale(.97); }
.btn-liberar { flex:1; background:#e53935; color:#fff; border:none;
  border-radius:10px; padding:12px; font-size:14px; font-weight:700;
  cursor:pointer; transition:transform .15s; }
.btn-liberar:active { transform:scale(.97); }
.btn-disabled { flex:1; background:#ccc; color:#fff; border:none;
  border-radius:10px; padding:12px; font-size:14px; font-weight:700;
  cursor:not-allowed; }
.btn-palapa-prox { flex:1; background:#fb8c00; color:#fff; border:none;
  border-radius:10px; padding:12px; font-size:13px; font-weight:700;
  cursor:default; }

/* Modal aforo piscina */
.modal-overlay { position:fixed; inset:0; background:rgba(0,0,0,.5);
  display:flex; align-items:flex-end; justify-content:center;
  z-index:100; display:none; }
.modal-overlay.show { display:flex; }
.modal-box { background:#fff; border-radius:20px 20px 0 0; padding:24px 20px;
  width:100%; max-width:480px; }
.modal-title { font-size:17px; font-weight:700; margin-bottom:16px; color:#1565c0; }

/* Loader */
.loader { text-align:center; padding:32px; color:#888; font-size:14px; }

/* Historial */
.hist-titulo { font-size:13px; font-weight:700; color:#666; margin:8px 0 10px;
  text-transform:uppercase; letter-spacing:.5px; }
.hist-item { display:flex; justify-content:space-between; align-items:center;
  padding:10px 0; border-bottom:1px solid #f0f0f0; font-size:13px; }
.hist-item:last-child { border-bottom:none; }
.hist-item .hi-nombre { color:#333; font-weight:500; }
.hist-item .hi-hora   { color:#1976d2; font-size:12px; }
.hist-item .hi-casa   { color:#888; font-size:11px; }
</style>
</head>
<body>

<!-- ══════════ MENÚ DE PRUEBA ══════════ -->
<div id="s-menu" class="screen active">
  <div class="app-header">
    <div class="header-title">
      <h1>Privada Paamul</h1>
      <p>Módulo de prueba</p>
    </div>
  </div>
  <div class="content">
    <div class="menu-info">
      <p>Probando como</p>
      <h2>🏠 Depto 4A — Sr. Daniel Salazar</h2>
    </div>
    <div class="mod-grid">
      <button class="mod-btn" onclick="ir('s-visitas'); cargarVisitas()">
        <span class="m-icon">🚗</span>
        <span class="m-title">Visitas</span>
        <span class="m-desc">Registrar acceso</span>
      </button>
      <button class="mod-btn" onclick="ir('s-amenidades'); cargarAmenidades()">
        <span class="m-icon">🏊</span>
        <span class="m-title">Amenidades</span>
        <span class="m-desc">Piscina, palapa y mesas</span>
      </button>
    </div>
    <div id="msg-menu" class="msg"></div>
  </div>
</div>

<!-- ══════════ VISITAS ══════════ -->
<div id="s-visitas" class="screen">
  <div class="app-header">
    <button class="back" onclick="ir('s-menu')">←</button>
    <div class="header-title">
      <h1>Privada Paamul</h1>
      <p>Registrar visita</p>
    </div>
  </div>
  <div class="content">
    <div id="msg-visita" class="msg"></div>
    <div class="card">
      <p class="card-title">🚗 Nueva visita</p>
      <div class="fg">
        <label>Nombre del visitante</label>
        <input type="text" id="vis-nombre" placeholder="Nombre completo">
      </div>
      <div class="fg">
        <label>Hora estimada de llegada</label>
        <select id="vis-hora"></select>
      </div>
      <button class="btn-submit" onclick="registrarVisita()">Registrar Visita</button>
    </div>

    <!-- Historial de visitas del día -->
    <div class="card">
      <p class="card-title">📋 Visitas de hoy</p>
      <div id="visitas-lista"><div class="loader">Cargando...</div></div>
    </div>
  </div>
</div>

<!-- ══════════ AMENIDADES ══════════ -->
<div id="s-amenidades" class="screen">
  <div class="app-header">
    <button class="back" onclick="ir('s-menu')">←</button>
    <div class="header-title">
      <h1>Privada Paamul</h1>
      <p>Amenidades</p>
    </div>
  </div>
  <div class="content">
    <div id="msg-amenidad" class="msg"></div>
    <p style="font-size:13px; color:#666; margin-bottom:12px">
      Estado en tiempo real · Toca para ocupar o liberar
    </p>
    <div id="amenidades-lista"><div class="loader">Cargando...</div></div>
  </div>
</div>

<!-- ══════════ MODAL AFORO PISCINA ══════════ -->
<div class="modal-overlay" id="modal-aforo">
  <div class="modal-box">
    <p class="modal-title">🏊 Ocupar Piscina</p>
    <div class="fg">
      <label>¿Cuántas personas van a la piscina? (máx. 15 en total)</label>
      <select id="aforo-personas">
        <option value="">Selecciona...</option>
        <option value="1">1 persona</option>
        <option value="2">2 personas</option>
        <option value="3">3 personas</option>
        <option value="4">4 personas</option>
        <option value="5">5 personas</option>
        <option value="6">6 personas</option>
        <option value="7">7 personas (máx. por depto)</option>
      </select>
    </div>
    <p id="aforo-disponible" style="font-size:13px; color:#666; margin-bottom:14px"></p>
    <button class="btn-submit" id="btn-confirmar-aforo" onclick="confirmarOcuparPiscina()">
      Confirmar entrada
    </button>
    <button onclick="cerrarModalAforo()" style="background:none; border:none;
      color:#888; font-size:14px; cursor:pointer; padding:12px; width:100%; margin-top:4px;">
      Cancelar
    </button>
  </div>
</div>

<script>
// ── Config ────────────────────────────────────────────────────
const API = 'https://script.google.com/macros/s/AKfycbz2oM-fbr0xehpVv6ir1-nizYSwumNTpFY1mcetMBRjJH_a4E6kPHnogDRMp22HqzqMxA/exec'; // <-- misma URL de tu Apps Script

// Sesión simulada para pruebas (en producción viene del login real)
const sesion = {
  casa: '4A',
  nombre: 'Sr. Daniel Salazar',
  genero: 'Hombre',
  rol: 'Propietario'
};

// ── Navegación ────────────────────────────────────────────────
function ir(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  window.scrollTo(0, 0);
}

// ── Utilidades ────────────────────────────────────────────────
function showMsg(el, tipo, txt) {
  el.className = `msg ${tipo} show`;
  el.textContent = txt;
  if (tipo === 'ok') setTimeout(() => el.classList.remove('show'), 3000);
}

async function post(datos) {
  const res = await fetch(API, {
    method: 'POST',
    headers: { 'Content-Type': 'text/plain;charset=utf-8' },
    body: JSON.stringify(datos)
  });
  return res.json();
}

function hoyISO() {
  return new Date().toISOString().split('T')[0];
}

// ── VISITAS ───────────────────────────────────────────────────

// Poblar selector de horas con fracciones de 15 min
window.onload = () => {
  const sel = document.getElementById('vis-hora');
  for (let h = 6; h <= 23; h++) {
    [0, 15, 30, 45].forEach(m => {
      const periodo = h < 12 ? 'AM' : 'PM';
      const h12 = h === 0 ? 12 : h > 12 ? h - 12 : h;
      const mStr = String(m).padStart(2, '0');
      const valor = `${String(h).padStart(2,'0')}:${mStr}`;
      const label = `${h12}:${mStr} ${periodo}`;
      const opt = document.createElement('option');
      opt.value = valor; opt.textContent = label;
      sel.appendChild(opt);
    });
  }
  // Medianoche
  const opt = document.createElement('option');
  opt.value = '00:00'; opt.textContent = '12:00 AM';
  sel.appendChild(opt);

  // Pre-seleccionar la hora más cercana
  const ahora = new Date();
  const hAct  = ahora.getHours();
  const mAct  = Math.ceil(ahora.getMinutes() / 15) * 15;
  const mFin  = mAct >= 60 ? 0 : mAct;
  const hFin  = mAct >= 60 ? hAct + 1 : hAct;
  sel.value = `${String(hFin).padStart(2,'0')}:${String(mFin).padStart(2,'0')}`;
};

async function registrarVisita() {
  const msg    = document.getElementById('msg-visita');
  const nombre = document.getElementById('vis-nombre').value.trim();
  const hora   = document.getElementById('vis-hora').value;
  if (!nombre) { showMsg(msg, 'error', 'Escribe el nombre del visitante'); return; }

  const btn = document.querySelector('#s-visitas .btn-submit');
  btn.disabled = true; btn.textContent = 'Registrando...';
  try {
    const res = await post({
      accion: 'registrarVisita',
      nombre_visitante: nombre,
      hora_estimada: hora,
      casa: sesion.casa,
      registrado_por: sesion.nombre
    });
    if (res.ok) {
      showMsg(msg, 'ok', `✅ Visita registrada (${res.id})`);
      document.getElementById('vis-nombre').value = '';
      cargarVisitas();
    } else {
      showMsg(msg, 'error', res.error || 'Error al registrar');
    }
  } catch(e) {
    showMsg(msg, 'error', 'Error de conexión');
  }
  btn.disabled = false; btn.textContent = 'Registrar Visita';
}

async function cargarVisitas() {
  const lista = document.getElementById('visitas-lista');
  lista.innerHTML = '<div class="loader">Cargando...</div>';
  try {
    const res  = await fetch(`${API}?accion=getVisitas&casa=${encodeURIComponent(sesion.casa)}`);
    const data = await res.json();
    const hoy  = hoyISO();
    const deHoy = Array.isArray(data)
      ? data.filter(v => String(v.Fecha || '').startsWith(hoy)).reverse()
      : [];

    if (deHoy.length === 0) {
      lista.innerHTML = '<p style="color:#888; text-align:center; padding:16px">Sin visitas registradas hoy</p>';
      return;
    }

    // Convertir hora 24h a 12h para mostrar
    const fmt12 = h24 => {
      if (!h24) return '';
      const [h, m] = h24.split(':').map(Number);
      const p = h < 12 ? 'AM' : 'PM';
      const h12 = h === 0 ? 12 : h > 12 ? h - 12 : h;
      return `${h12}:${String(m).padStart(2,'0')} ${p}`;
    };

    lista.innerHTML = deHoy.map(v => `
      <div class="visita-card">
        <div class="vc-nombre">👤 ${v.Nombre_Visitante}</div>
        <div class="vc-hora">🕐 Llegada estimada: ${fmt12(v.Hora_Estimada)}</div>
        <div class="vc-meta">Registrado por ${v.Registrado_Por} · ${v.Estatus}</div>
      </div>`).join('');
  } catch(e) {
    lista.innerHTML = '<p style="color:#c62828; text-align:center; padding:16px">Error al cargar</p>';
  }
}

// ── AMENIDADES ────────────────────────────────────────────────

let amenidadesData = [];
let aforoPiscinaActual = 0;

async function cargarAmenidades() {
  const lista = document.getElementById('amenidades-lista');
  lista.innerHTML = '<div class="loader">Cargando estado...</div>';
  try {
    const res  = await fetch(`${API}?accion=getAmenidades`);
    amenidadesData = await res.json();
    if (!Array.isArray(amenidadesData)) throw new Error('Respuesta inválida');
    renderAmenidades();
  } catch(e) {
    lista.innerHTML = '<p style="color:#c62828; text-align:center; padding:16px">Error al cargar amenidades</p>';
  }
}

function renderAmenidades() {
  const lista = document.getElementById('amenidades-lista');
  const iconos = {
    'Piscina': '🏊', 'Palapa': '🌴',
    'Mesa 1': '🪑', 'Mesa 2': '🪑', 'Mesa 3': '🪑'
  };

  lista.innerHTML = amenidadesData.map(a => {
    const icono     = iconos[a.Amenidad] || '📍';
    const esPiscina = a.Amenidad === 'Piscina';
    const esPalapa  = a.Amenidad === 'Palapa';
    const libre     = a.Estatus !== 'Ocupada';
    const esMia     = String(a.Ocupado_Por_Casa || '').toUpperCase().trim() ===
                      String(sesion.casa).toUpperCase().trim();
    const claseCard = esPalapa ? 'palapa' : libre ? 'libre' : 'ocupada';
    const claseBadge = esPalapa ? 'palapa' : libre ? 'libre' : 'ocupada';
    const badgeTxt  = esPalapa ? '🚧 Próximamente' : libre ? '✅ Libre' : '🔴 Ocupada';

    // Info de quién la tiene
    let infoTxt = '';
    if (!libre && a.Ocupado_Por_Casa) {
      infoTxt = `<strong>Depto ${a.Ocupado_Por_Casa}</strong>` +
        (a.Hora_Inicio ? ` · desde ${fmt12(a.Hora_Inicio)}` : '');
    }

    // Barra de aforo para piscina
    let aforoHtml = '';
    if (esPiscina) {
      const actual  = parseInt(a.aforo_actual) || 0;
      const max     = parseInt(a.aforo_max)    || 15;
      aforoPiscinaActual = actual;
      const pct     = Math.min((actual / max) * 100, 100);
      const claseFill = pct >= 100 ? 'lleno' : pct >= 80 ? 'casi' : '';
      aforoHtml = `
        <div class="aforo-bar-wrap">
          <div class="aforo-label">
            <span>Aforo actual</span>
            <span><strong>${actual}</strong> / ${max} personas</span>
          </div>
          <div class="aforo-bar">
            <div class="aforo-fill ${claseFill}" style="width:${pct}%"></div>
          </div>
        </div>`;
    }

    // Botones de acción
    let accionHtml = '';
    if (esPalapa) {
      accionHtml = `<div class="am-actions">
        <button class="btn-palapa-prox">🚧 Reservas próximamente</button>
      </div>`;
    } else if (libre) {
      accionHtml = `<div class="am-actions">
        <button class="btn-ocupar" onclick="ocupar('${a.Amenidad}')">
          ${esPiscina ? '🏊 Entrar a la piscina' : '🪑 Ocupar'}
        </button>
      </div>`;
    } else if (esMia) {
      accionHtml = `<div class="am-actions">
        <button class="btn-liberar" onclick="liberar('${a.Amenidad}')">
          ${esPiscina ? '🚪 Salir de la piscina' : '🔓 Liberar mesa'}
        </button>
      </div>`;
    } else {
      accionHtml = `<div class="am-actions">
        <button class="btn-disabled">No disponible</button>
      </div>`;
    }

    return `
    <div class="amenidad-card ${claseCard}">
      <div class="am-header">
        <span class="am-nombre">${icono} ${a.Amenidad}</span>
        <span class="am-badge ${claseBadge}">${badgeTxt}</span>
      </div>
      <div class="am-info">${infoTxt}</div>
      ${aforoHtml}
      ${accionHtml}
    </div>`;
  }).join('');
}

function fmt12(h24) {
  if (!h24) return '';
  const parts = String(h24).split(':');
  const h = parseInt(parts[0]);
  const m = parts[1] || '00';
  const p = h < 12 ? 'AM' : 'PM';
  const h12 = h === 0 ? 12 : h > 12 ? h - 12 : h;
  return `${h12}:${m} ${p}`;
}

// Ocupar amenidad (piscina abre modal, resto directo)
function ocupar(amenidad) {
  if (amenidad === 'Piscina') {
    const disponible = 15 - aforoPiscinaActual;
    if (disponible <= 0) {
      showMsg(document.getElementById('msg-amenidad'), 'error',
        'La piscina está llena (15/15 personas)');
      return;
    }
    document.getElementById('aforo-disponible').textContent =
      `Lugares disponibles: ${disponible} de 15`;
    // Limitar selector al disponible y al máx 7 por depto
    const maxSel = Math.min(disponible, 7);
    const sel = document.getElementById('aforo-personas');
    sel.innerHTML = '<option value="">Selecciona...</option>';
    for (let i = 1; i <= maxSel; i++) {
      const opt = document.createElement('option');
      opt.value = i;
      opt.textContent = i + (i === 7 ? ' personas (máx. por depto)' : i === 1 ? ' persona' : ' personas');
      sel.appendChild(opt);
    }
    document.getElementById('modal-aforo').classList.add('show');
    return;
  }
  // Mesas: ocupar directo
  ocuparDirecto(amenidad, null);
}

async function confirmarOcuparPiscina() {
  const personas = parseInt(document.getElementById('aforo-personas').value);
  if (!personas) {
    alert('Selecciona el número de personas');
    return;
  }
  cerrarModalAforo();
  await ocuparDirecto('Piscina', personas);
}

function cerrarModalAforo() {
  document.getElementById('modal-aforo').classList.remove('show');
}

async function ocuparDirecto(amenidad, numPersonas) {
  const msg = document.getElementById('msg-amenidad');
  showMsg(msg, 'info', 'Registrando...');
  try {
    const res = await post({
      accion: 'ocuparAmenidad',
      amenidad, casa: sesion.casa,
      nombre: sesion.nombre,
      num_personas: numPersonas || ''
    });
    if (res.ok) {
      showMsg(msg, 'ok', `✅ ${amenidad} ocupada`);
      await cargarAmenidades();
    } else {
      showMsg(msg, 'error', res.error || 'No se pudo ocupar');
    }
  } catch(e) {
    showMsg(msg, 'error', 'Error de conexión');
  }
}

async function liberar(amenidad) {
  const msg = document.getElementById('msg-amenidad');
  showMsg(msg, 'info', 'Liberando...');
  try {
    const res = await post({
      accion: 'liberarAmenidad',
      amenidad, casa: sesion.casa
    });
    if (res.ok) {
      showMsg(msg, 'ok', `✅ ${amenidad} liberada`);
      await cargarAmenidades();
    } else {
      showMsg(msg, 'error', res.error || 'No se pudo liberar');
    }
  } catch(e) {
    showMsg(msg, 'error', 'Error de conexión');
  }
}
</script>
