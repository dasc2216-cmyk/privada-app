<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Privada App — Paamul</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: Arial, sans-serif; background: #f0f2f5; color: #333; }
    .header { background: #1a73e8; color: white; padding: 16px; text-align: center; }
    .header h1 { font-size: 20px; }
    .header p { font-size: 13px; margin-top: 4px; opacity: 0.9; }
    .menu { display: flex; flex-direction: column; gap: 16px; padding: 24px; max-width: 400px; margin: 0 auto; }
    .bienvenida { background: white; border-radius: 12px; padding: 16px; text-align: center; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
    .bienvenida h3 { color: #1a73e8; font-size: 16px; }
    .saldo-box { background: #e8f0fe; border-radius: 8px; padding: 12px; margin-top: 8px; }
    .saldo-box .monto { font-size: 22px; font-weight: bold; color: #c5221f; }
    .saldo-box .monto.ok { color: #137333; }
    .btn { background: white; border: none; border-radius: 12px; padding: 20px; text-align: left; cursor: pointer; box-shadow: 0 2px 8px rgba(0,0,0,0.1); display: flex; align-items: center; gap: 16px; font-size: 16px; width: 100%; }
    .btn:hover { background: #e8f0fe; }
    .btn .icono { font-size: 32px; }
    .btn .texto h3 { font-size: 16px; color: #1a73e8; }
    .btn .texto p { font-size: 13px; color: #666; margin-top: 4px; }
    .pantalla { display: none; padding: 16px; max-width: 400px; margin: 0 auto; }
    .pantalla.activa { display: block; }
    .back { background: none; border: none; color: #1a73e8; font-size: 16px; cursor: pointer; margin-bottom: 16px; display: flex; align-items: center; gap: 8px; }
    .form-group { margin-bottom: 16px; }
    .form-group label { display: block; font-size: 14px; color: #666; margin-bottom: 6px; }
    .form-group input, .form-group select { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px; font-size: 16px; }
    .submit { background: #1a73e8; color: white; border: none; border-radius: 8px; padding: 14px; width: 100%; font-size: 16px; cursor: pointer; margin-top: 8px; }
    .submit:hover { background: #1557b0; }
    .card { background: white; border-radius: 12px; padding: 16px; margin-bottom: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
    .bloque { background: white; border-radius: 12px; padding: 16px; margin-bottom: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); cursor: pointer; border: 2px solid transparent; }
    .bloque:hover { border-color: #1a73e8; }
    .bloque.ocupado { background: #fce8e6; cursor: not-allowed; opacity: 0.6; }
    .bloque.seleccionado { border-color: #1a73e8; background: #e8f0fe; }
    .tag { display: inline-block; padding: 4px 10px; border-radius: 20px; font-size: 12px; margin-top: 8px; }
    .tag.disponible { background: #e6f4ea; color: #137333; }
    .tag.ocupado { background: #fce8e6; color: #c5221f; }
    .mensaje { padding: 16px; border-radius: 8px; margin-bottom: 16px; text-align: center; }
    .mensaje.ok { background: #e6f4ea; color: #137333; }
    .mensaje.error { background: #fce8e6; color: #c5221f; }
    .reglas-amenidad { background: #fff8e1; border: 1px solid #f9a825; border-radius: 8px; padding: 12px; margin-bottom: 16px; font-size: 13px; line-height: 1.6; }
    .reglas-amenidad h4 { color: #f57f17; margin-bottom: 6px; }
    .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 100; justify-content: center; align-items: center; }
    .modal.activo { display: flex; }
    .modal-content { background: white; border-radius: 16px; padding: 24px; max-width: 360px; width: 90%; text-align: center; }
    .modal-content h3 { color: #137333; font-size: 20px; margin-bottom: 12px; }
    .modal-content .reglas-modal { background: #fff8e1; border: 1px solid #f9a825; border-radius: 8px; padding: 12px; margin: 12px 0; font-size: 13px; line-height: 1.6; text-align: left; }
    .modal-content button { background: #1a73e8; color: white; border: none; border-radius: 8px; padding: 12px 24px; font-size: 16px; cursor: pointer; margin-top: 8px; width: 100%; }
    h2 { font-size: 18px; margin-bottom: 16px; color: #333; }
    .login-box { max-width: 400px; margin: 40px auto; padding: 24px; background: white; border-radius: 16px; box-shadow: 0 2px 16px rgba(0,0,0,0.1); }
    .login-box h2 { text-align: center; color: #1a73e8; margin-bottom: 24px; }

    /* Finanzas */
    .semaforo { border-radius: 12px; padding: 16px; text-align: center; margin-bottom: 16px; color: white; }
    .semaforo.verde { background: #137333; }
    .semaforo.rojo { background: #c5221f; }
    .semaforo .estatus-label { font-size: 13px; opacity: 0.9; }
    .semaforo .estatus-valor { font-size: 22px; font-weight: bold; margin-top: 4px; }
    .totales-finanzas { display: flex; gap: 12px; margin-bottom: 16px; }
    .total-box { flex: 1; background: white; border-radius: 12px; padding: 14px; text-align: center; box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
    .total-box .label { font-size: 12px; color: #666; }
    .total-box .valor { font-size: 18px; font-weight: bold; margin-top: 4px; }
    .total-box.adeudo .valor { color: #c5221f; }
    .total-box.abonado .valor { color: #137333; }
    .total-box.atrasado { background: #e6f4ea; }
    .total-box.atrasado .label { color: #137333; }
    .total-box.atrasado .valor { color: #137333; }
    .desglose-titulo { font-size: 13px; color: #666; margin: 16px 0 8px; font-weight: bold; }
    .finanzas-card { background: white; border-radius: 10px; padding: 14px; margin-bottom: 8px; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 1px 4px rgba(0,0,0,0.06); }
    .finanzas-card .concepto { font-size: 14px; color: #333; }
    .finanzas-card .monto-item { font-weight: bold; color: #137333; font-size: 15px; }
  </style>
</head>
<body>

<!-- LOGIN -->
<div id="login-screen">
  <div class="header">
    <h1>🏘️ Paamul App</h1>
    <p>Acceso para residentes</p>
  </div>
  <div class="login-box">
    <h2>🔐 Iniciar Sesión</h2>
    <div id="msg-login"></div>
    <div class="form-group">
      <label>Número de depto</label>
      <input type="text" id="login-casa" placeholder="Ej: 4A" style="text-transform:uppercase">
    </div>
    <div class="form-group">
      <label>PIN</label>
      <input type="password" id="login-pin" placeholder="Tu PIN de acceso">
    </div>
    <div class="form-group">
      <label>Tu nombre completo</label>
      <input type="text" id="login-nombre" placeholder="Nombre y apellido">
    </div>
    <button class="submit" onclick="iniciarSesion()">Entrar</button>
  </div>
</div>

<!-- APP PRINCIPAL -->
<div id="app-screen" style="display:none">

  <div class="header">
    <h1>🏘️ Paamul App</h1>
    <p id="header-bienvenida">Departamento</p>
  </div>

  <div id="menu" class="menu">
    <div class="bienvenida">
      <h3 id="nombre-residente">Cargando...</h3>
      <div class="saldo-box">
        <div style="font-size:13px; color:#666; margin-bottom:4px">Saldo pendiente</div>
        <div class="monto" id="saldo-pendiente">Cargando...</div>
      </div>
    </div>
    <button class="btn" onclick="mostrar('visitas')">
      <span class="icono">🚗</span>
      <div class="texto">
        <h3>Registrar Visita</h3>
        <p>Avisa que viene alguien a tu casa</p>
      </div>
    </button>
    <button class="btn" onclick="mostrar('reservas')">
      <span class="icono">📅</span>
      <div class="texto">
        <h3>Reservar Amenidad</h3>
        <p>Palapa, mesas y más</p>
      </div>
    </button>
    <button class="btn" onclick="mostrar('mis-reservas')">
      <span class="icono">📋</span>
      <div class="texto">
        <h3>Mis Reservas</h3>
        <p>Ver y cancelar tus reservas</p>
      </div>
    </button>
    <button class="btn" onclick="mostrar('finanzas')">
      <span class="icono">💰</span>
      <div class="texto">
        <h3>Mis Finanzas</h3>
        <p>Consulta tu estado de cuenta</p>
      </div>
    </button>
    <button class="btn" id="btn-servicios" onclick="mostrar('servicios')">
      <span class="icono">🔑</span>
      <div class="texto">
        <h3>Servicios Adicionales</h3>
        <p>Llave de azotea y escalera</p>
      </div>
    </button>
    <button style="background:none; border:none; color:#999; font-size:13px; cursor:pointer; padding:8px;" onclick="cerrarSesion()">Cerrar sesión</button>
  </div>

  <!-- PANTALLA VISITAS -->
  <div id="visitas" class="pantalla">
    <button class="back" onclick="mostrar('menu')">← Regresar</button>
    <h2>🚗 Registrar Visita</h2>
    <div id="msg-visita"></div>
    <div class="form-group">
      <label>Nombre del visitante</label>
      <input type="text" id="v-nombre" placeholder="Nombre completo">
    </div>
    <div class="form-group">
      <label>Fecha de llegada</label>
      <input type="date" id="v-fecha">
    </div>
    <div class="form-group">
      <label>Hora estimada</label>
      <input type="time" id="v-hora">
    </div>
    <div class="form-group">
      <label>¿Trae auto?</label>
      <select id="v-auto">
        <option value="No">No</option>
        <option value="Si">Sí</option>
      </select>
    </div>
    <button class="submit" onclick="registrarVisita()">Registrar Visita</button>
  </div>

  <!-- PANTALLA RESERVAS -->
  <div id="reservas" class="pantalla">
    <button class="back" onclick="mostrar('menu')">← Regresar</button>
    <h2>📅 Reservar Amenidad</h2>
    <div id="msg-reserva"></div>
    <div class="form-group">
      <label>Nombre completo</label>
      <input type="text" id="r-nombre" placeholder="Nombre y apellido">
    </div>
    <div class="form-group">
      <label>¿Qué quieres reservar?</label>
      <select id="r-amenidad" onchange="onAmenidadChange()">
        <option value="">Selecciona...</option>
      </select>
    </div>
    <div id="regla-amenidad-box" style="display:none" class="reglas-amenidad">
      <h4>📋 Reglamento</h4>
      <p id="regla-amenidad-texto"></p>
    </div>
    <div class="form-group">
      <label>Fecha</label>
      <input type="date" id="r-fecha" onchange="onFechaChange()" min="">
    </div>
    <div id="horarios-container"></div>
    <div id="mesas-container" style="display:none">
      <div class="form-group">
        <label>Hora de inicio</label>
        <select id="r-hora-inicio" onchange="onHoraChange()">
          <option value="">Selecciona hora...</option>
        </select>
      </div>
      <div class="form-group" id="duracion-grupo">
        <label>¿Cuántas horas?</label>
        <select id="r-duracion" onchange="verificarDisponibilidad()">
          <option value="">Selecciona...</option>
        </select>
      </div>
      <div id="disponibilidad-mesa"></div>
    </div>
    <div class="form-group" style="display:none" id="r-notas-grupo">
      <label>Notas (opcional)</label>
      <input type="text" id="r-notas" placeholder="Algún comentario...">
    </div>
    <button class="submit" onclick="registrarReserva()" style="display:none" id="btn-reservar">Confirmar Reserva</button>
  </div>

  <!-- PANTALLA MIS RESERVAS -->
  <div id="mis-reservas" class="pantalla">
    <button class="back" onclick="mostrar('menu')">← Regresar</button>
    <h2>📋 Mis Reservas</h2>
    <div id="mis-reservas-lista" style="margin-top:16px"></div>
  </div>

  <!-- PANTALLA FINANZAS -->
  <div id="finanzas" class="pantalla">
    <button class="back" onclick="mostrar('menu')">← Regresar</button>
    <h2>💰 Mis Finanzas</h2>
    <div id="finanzas-lista"></div>
  </div>

  <!-- PANTALLA SERVICIOS ADICIONALES -->
  <div id="servicios" class="pantalla">
    <button class="back" onclick="mostrar('menu')">← Regresar</button>
    <h2>🔑 Servicios Adicionales</h2>
    <div id="msg-servicios"></div>
    <p style="font-size:13px; color:#666; margin-bottom:16px">Tu edificio: <strong id="servicios-edificio">—</strong></p>
    <div class="form-group">
      <label>¿Qué necesitas?</label>
      <select id="serv-articulo" onchange="onArticuloChange()">
        <option value="">Selecciona...</option>
        <option value="Llave de Azotea">Llave de Azotea</option>
        <option value="Escalera Comunitaria">Escalera Comunitaria</option>
      </select>
    </div>
    <div id="regla-servicio-box" style="display:none" class="reglas-amenidad">
      <h4>📋 Reglamento</h4>
      <p id="regla-servicio-texto"></p>
    </div>
    <div id="estado-servicio-box"></div>
    <div class="form-group" id="serv-accion-grupo" style="display:none">
      <label>¿Qué deseas hacer?</label>
      <select id="serv-accion">
        <option value="Préstamo">Solicitar (Préstamo)</option>
        <option value="Devolución">Registrar Devolución</option>
      </select>
    </div>
    <button class="submit" onclick="registrarServicio()" style="display:none" id="btn-servicio">Confirmar</button>
  </div>

</div>

<!-- MODAL CONFIRMACION -->
<div id="modal-confirmacion" class="modal">
  <div class="modal-content">
    <h3>✅ Reserva Confirmada</h3>
    <p id="modal-resumen" style="font-size:14px; color:#666; margin-bottom:8px"></p>
    <div class="reglas-modal" id="modal-reglas"></div>
    <button onclick="cerrarModal()">Entendido ✓</button>
  </div>
</div>

<script>
const API = 'https://script.google.com/macros/s/AKfycbwHYpnp-pLU6AI82_zEtPuvF6l8tvkoT-R6n-sMbG7oVX867UI4J8GriJwqLW7bBWLOxQ/exec';
let horarioSeleccionado = null;
let amenidades = [];
let reglas = [];
let reservas = [];
let horarios = [];
let sesion = null;

// Conceptos del desglose de finanzas: clave del Sheet -> etiqueta bonita
const CONCEPTOS_FINANZAS = [
  { key: 'Controles', label: 'Controles' },
  { key: 'Chips', label: 'Chips' },
  { key: 'Multas', label: 'Multas' },
  { key: 'Cuota', label: 'Cuota' },
  { key: 'Mtto', label: 'Mantenimiento' },
  { key: 'Luz', label: 'Luz' }
];

// Limpia fechas tipo "2026-06-18T05:00:00.000Z" dejando solo "2026-06-18"
function limpiarFecha(valor) {
  if (!valor) return '';
  const str = String(valor);
  return str.includes('T') ? str.split('T')[0] : str;
}

// Convierte montos tipo "$5,850.00" o "5850" a número real (5850)
function limpiarMonto(valor) {
  if (valor === null || valor === undefined || valor === '') return 0;
  if (typeof valor === 'number') return valor;
  const limpio = String(valor).replace(/[^0-9.\-]/g, '');
  const num = parseFloat(limpio);
  return isNaN(num) ? 0 : num;
}

function generarDispositivoId() {
  let id = localStorage.getItem('paamul_dispositivo_id');
  if (!id) {
    id = 'disp_' + Date.now() + '_' + Math.random().toString(36).substring(2, 10);
    localStorage.setItem('paamul_dispositivo_id', id);
  }
  return id;
}

// Calcula el edificio a partir del número de depto. Ej: 4A -> depto 4 -> Edificio 2 (3-4)
function calcularEdificio(casa) {
  const match = String(casa).match(/\d+/);
  if (!match) return null;
  const numero = parseInt(match[0]);
  return Math.ceil(numero / 2);
}

window.onload = () => {
  const hoy = new Date().toISOString().split('T')[0];
  document.getElementById('r-fecha').min = hoy;
  document.getElementById('v-fecha').min = hoy;
  const sesionGuardada = localStorage.getItem('paamul_sesion');
  if (sesionGuardada) {
    sesion = JSON.parse(sesionGuardada);
    iniciarApp();
  }
};

async function iniciarSesion() {
  const casa = document.getElementById('login-casa').value.trim().toUpperCase();
  const pin = document.getElementById('login-pin').value.trim();
  const nombreIngreso = document.getElementById('login-nombre').value.trim();
  if (!casa || !pin || !nombreIngreso) {
    document.getElementById('msg-login').innerHTML = '<div class="mensaje error">Por favor llena depto, PIN y tu nombre</div>';
    return;
  }
  document.getElementById('msg-login').innerHTML = '<div class="mensaje ok">Validando...</div>';
  try {
    const dispositivoId = generarDispositivoId();
    await fetch(API, {
      method: 'POST', mode: 'no-cors',
      body: JSON.stringify({ accion: 'validarPin', casa, pin, dispositivo_id: dispositivoId })
    });
    // Validamos localmente contra getCasas (la llamada de arriba registra el dispositivo en el Sheet)
    const casasRes = await fetch(`${API}?accion=getCasas`);
    const casasData = await casasRes.json();
    const casaEncontrada = casasData.find(c => String(c.ID_Casa).toUpperCase().trim() === casa);

    if (!casaEncontrada) {
      document.getElementById('msg-login').innerHTML = '<div class="mensaje error">Depto no encontrado</div>';
      return;
    }

    const pinProp = String(casaEncontrada.PIN_Propietario || '').trim();
    const pinRes = String(casaEncontrada.PIN_Residente || '').trim();
    let rol = null;
    if (pinProp !== '' && pinProp === pin) {
      rol = 'Propietario';
    } else if (pinRes !== '' && pinRes === pin) {
      rol = 'Residente';
    } else {
      document.getElementById('msg-login').innerHTML = '<div class="mensaje error">PIN incorrecto</div>';
      return;
    }

    // Usamos el nombre que la persona escribió al ingresar (puede variar entre residentes del mismo depto)
    sesion = { casa: casaEncontrada.ID_Casa, nombre: nombreIngreso, rol: rol, edificio: calcularEdificio(casaEncontrada.ID_Casa) };
    localStorage.setItem('paamul_sesion', JSON.stringify(sesion));
    iniciarApp();
  } catch(e) {
    document.getElementById('msg-login').innerHTML = '<div class="mensaje error">Error de conexión, intenta de nuevo</div>';
  }
}

async function iniciarApp() {
  document.getElementById('login-screen').style.display = 'none';
  document.getElementById('app-screen').style.display = 'block';
  document.getElementById('header-bienvenida').textContent = `Departamento ${sesion.casa}`;
  document.getElementById('nombre-residente').textContent = `Bienvenido, ${sesion.nombre}`;
  document.getElementById('servicios-edificio').textContent = `Edificio ${sesion.edificio}`;
  cargarAmenidades();
  cargarMisReservas();
  await aplicarBloqueosPorAdeudo();
}

// Si el rol es Residente y su Estatus es ADEUDO, bloquea Reservas y Visitas (deja solo Servicios Adicionales)
async function aplicarBloqueosPorAdeudo() {
  document.getElementById('saldo-pendiente').textContent = 'Cargando...';
  try {
    const res = await fetch(`${API}?accion=getFinanzas`);
    const data = await res.json();
    const fin = obtenerFinanzasCasa(data);
    const estatus = fin ? String(fin.Estatus || '').trim().toUpperCase() : '';
    sesion.bloqueado = (sesion.rol === 'Residente' && !ESTATUS_OK.includes(estatus));

    const elSaldo = document.getElementById('saldo-pendiente');
    if (sesion.rol === 'Propietario') {
      const adeudo = fin ? limpiarMonto(fin.Adeudo) : 0;
      if (adeudo <= 0) { elSaldo.textContent = '✅ Sin adeudos'; elSaldo.classList.add('ok'); }
      else { elSaldo.textContent = `$${adeudo.toLocaleString('es-MX')} MXN`; elSaldo.classList.remove('ok'); }
    } else {
      // Residente: solo ve el estatus general, no montos
      if (estatus) {
        const ok = ESTATUS_OK.includes(estatus);
        elSaldo.textContent = ok ? `✅ ${fin.Estatus}` : `⚠️ ${fin.Estatus}`;
        elSaldo.classList.toggle('ok', ok);
      } else {
        elSaldo.textContent = 'Sin información';
      }
    }

    const btnVisitas = document.querySelector('button[onclick="mostrar(\'visitas\')"]');
    const btnReservas = document.querySelector('button[onclick="mostrar(\'reservas\')"]');
    if (sesion.bloqueado) {
      [btnVisitas, btnReservas].forEach(btn => {
        if (btn) { btn.style.opacity = '0.45'; btn.style.cursor = 'not-allowed'; btn.onclick = mostrarBloqueoAdeudo; }
      });
    }
  } catch(e) {
    document.getElementById('saldo-pendiente').textContent = 'No disponible';
  }
}

function mostrarBloqueoAdeudo() {
  const reglaBloqueo = reglas.find(r => r.Amenidad === 'Cuenta_Bloqueada');
  const msg = reglaBloqueo ? reglaBloqueo.Regla : 'Tu cuenta presenta un adeudo. Por favor regulariza tu situación con la administración.';
  alert('⚠️ ' + msg);
}

function cerrarSesion() {
  localStorage.removeItem('paamul_sesion');
  sesion = null;
  location.reload();
}

function obtenerFinanzasCasa(data) {
  return data.find(f => String(f.Casa).toUpperCase().trim() === String(sesion.casa).toUpperCase().trim());
}

function mostrar(id) {
  document.getElementById('menu').style.display = id === 'menu' ? 'flex' : 'none';
  document.querySelectorAll('.pantalla').forEach(p => p.classList.remove('activa'));
  if (id !== 'menu') {
    document.getElementById(id).classList.add('activa');
    if (id === 'finanzas') cargarFinanzas();
  }
  horarioSeleccionado = null;
}

async function registrarVisita() {
  const casa = sesion.casa;
  const nombre = document.getElementById('v-nombre').value.trim();
  const fecha = document.getElementById('v-fecha').value;
  const hora = document.getElementById('v-hora').value;
  const auto = document.getElementById('v-auto').value;
  if (!nombre || !fecha || !hora) {
    document.getElementById('msg-visita').innerHTML = '<div class="mensaje error">Por favor llena todos los campos</div>';
    return;
  }

  const amenidad = document.getElementById('r-amenidad').value;
  const fecha = document.getElementById('r-fecha').value;
  if (!amenidad || !fecha) return;
  if (amenidad !== 'PAL-01') {
    const ahora = new Date();
    const hoy = ahora.toISOString().split('T')[0];
    const manana = new Date(ahora);
    manana.setDate(manana.getDate() + 1);
    const mananaStr = manana.toISOString().split('T')[0];
    if (fecha !== hoy && fecha !== mananaStr) {
      document.getElementById('mesas-container').style.display = 'none';
      document.getElementById('horarios-container').innerHTML = '<div class="mensaje error">Las mesas solo se pueden reservar para hoy o mañana</div>';
      return;
    }
  }
  try {
    const [resH, resR] = await Promise.all([
      fetch(`${API}?accion=getHorarios`),
      fetch(`${API}?accion=getReservas`)
    ]);

    reservas = await resR.json();

      mostrarBloquesPalapa(amenidad, fecha);

      mostrarSelectorMesas(amenidad, fecha);
    }

}

function mostrarBloquesPalapa(amenidad, fecha) {
  const container = document.getElementById('horarios-container');
  document.getElementById('mesas-container').style.display = 'none';
  const reservasHoy = reservas.filter(r => r.ID_Amenidad === amenidad && limpiarFecha(r.Fecha) === fecha && r.Estatus === 'Activa');
  const horariosAmenidad = horarios.filter(h => h.ID_Amenidad === amenidad && h.Activo === 'SI');
  if (horariosAmenidad.length === 0) {
    container.innerHTML = '<p style="color:#666">No hay horarios configurados</p>';
    return;
  }
  container.innerHTML = '<div class="form-group"><label>Selecciona bloque</label></div>';
  horariosAmenidad.forEach(h => {
    const ocupado = reservasHoy.some(r => r.ID_Horario === h.ID_Horario);
    const div = document.createElement('div');
    div.className = `bloque ${ocupado ? 'ocupado' : ''}`;
    div.id = `bloque-${h.ID_Horario}`;
    div.innerHTML = `<strong>${h.Hora_Inicio} - ${h.Hora_Fin}</strong><br><span class="tag ${ocupado ? 'ocupado' : 'disponible'}">${ocupado ? 'Ocupado' : 'Disponible'}</span>`;
    if (!ocupado) div.onclick = () => seleccionarBloque(h);
    container.appendChild(div);
  });
}

function seleccionarBloque(horario) {
  document.querySelectorAll('.bloque').forEach(b => b.classList.remove('seleccionado'));
  document.getElementById(`bloque-${horario.ID_Horario}`).classList.add('seleccionado');
  horarioSeleccionado = horario;
  document.getElementById('r-notas-grupo').style.display = 'block';
  document.getElementById('btn-reservar').style.display = 'block';
}

function mostrarSelectorMesas(amenidad, fecha) {
  document.getElementById('horarios-container').innerHTML = '';
  document.getElementById('mesas-container').style.display = 'block';
  const sel = document.getElementById('r-hora-inicio');
  sel.innerHTML = '<option value="">Selecciona hora...</option>';
  const ahora = new Date();
  const horaActual = ahora.getHours();
  const hoy = ahora.toISOString().split('T')[0];
  for (let h = 8; h <= 24; h++) {
    const val = h === 24 ? 0 : h;
    if (fecha === hoy && h !== 24 && h <= horaActual) continue;
    const txt = h === 24 ? '00:00 (medianoche)' : `${String(h).padStart(2,'0')}:00`;
    const opt = document.createElement('option');
    opt.value = val;
    opt.textContent = txt;
    sel.appendChild(opt);
  }
  document.getElementById('r-duracion').innerHTML = '<option value="">Selecciona...</option>';
  document.getElementById('disponibilidad-mesa').innerHTML = '';
  document.getElementById('r-notas-grupo').style.display = 'none';
  document.getElementById('btn-reservar').style.display = 'none';
  horarioSeleccionado = null;
}

function onHoraChange() {
  const hora = parseInt(document.getElementById('r-hora-inicio').value);
  const sel = document.getElementById('r-duracion');
  sel.innerHTML = '<option value="">Selecciona...</option>';
  const max = hora === 0 ? 1 : 4;
  for (let i = 1; i <= max; i++) {
    const opt = document.createElement('option');
    opt.value = i;
    opt.textContent = i === 1 ? '1 hora' : `${i} horas`;
    sel.appendChild(opt);
  }
  document.getElementById('disponibilidad-mesa').innerHTML = '';
  document.getElementById('r-notas-grupo').style.display = 'none';
  document.getElementById('btn-reservar').style.display = 'none';
  horarioSeleccionado = null;
}

function verificarDisponibilidad() {
  const amenidad = document.getElementById('r-amenidad').value;
  const fecha = document.getElementById('r-fecha').value;
  const horaInicio = parseInt(document.getElementById('r-hora-inicio').value);
  const duracion = parseInt(document.getElementById('r-duracion').value);
  const div = document.getElementById('disponibilidad-mesa');
  if (isNaN(horaInicio) || !duracion) return;
  const horaFin = horaInicio === 0 ? 1 : horaInicio + duracion;
  const reservasAmenidad = reservas.filter(r => r.ID_Amenidad === amenidad && limpiarFecha(r.Fecha) === fecha && r.Estatus === 'Activa');
  let conflicto = false;
  reservasAmenidad.forEach(r => {
    const rH = parseInt(String(r.Hora_Inicio).split(':')[0]);
    const rD = parseInt(r.Duracion_Hrs) || 1;
    const rF = rH === 0 ? 1 : rH + rD;
    if (horaInicio < rF && horaFin > rH) conflicto = true;
  });
  const horaInicioStr = horaInicio === 0 ? '00:00' : `${String(horaInicio).padStart(2,'0')}:00`;
  const horaFinStr = horaFin >= 24 ? '00:00' : `${String(horaFin).padStart(2,'0')}:00`;
  if (conflicto) {
    div.innerHTML = '<div class="mensaje error">⚠️ Ese horario ya está reservado, elige otro</div>';
    document.getElementById('btn-reservar').style.display = 'none';
    horarioSeleccionado = null;
  } else {
    div.innerHTML = `<div class="mensaje ok">✅ Disponible: ${horaInicioStr} - ${horaFinStr}</div>`;
    horarioSeleccionado = { ID_Horario: `MESA-${horaInicio}-${duracion}`, Hora_Inicio: horaInicioStr, Hora_Fin: horaFinStr, Duracion_Hrs: duracion };
    document.getElementById('r-notas-grupo').style.display = 'block';
    document.getElementById('btn-reservar').style.display = 'block';
  }
}

function obtenerRegla(amenidad) {
  const nombre = amenidad === 'PAL-01' ? 'Palapa' : 'Juego de Mesa, Sillas y Sombrilla';
  const regla = reglas.find(r => r.Amenidad === nombre);
  return regla ? regla.Regla : '';
}

async function registrarReserva() {

  const amenidad = document.getElementById('r-amenidad').value;

    return;
  }
  document.getElementById('msg-reserva').innerHTML = '<div class="mensaje ok">Registrando...</div>';
  try {
    await fetch(API, {
      method: 'POST', mode: 'no-cors',
      body: JSON.stringify({
        accion: 'registrarReserva', casa, nombre,
        id_amenidad: amenidad, fecha,
        id_horario: horarioSeleccionado.ID_Horario,
        hora_inicio: horarioSeleccionado.Hora_Inicio,

    document.getElementById('msg-reserva').innerHTML = '';
    horarioSeleccionado = null;
    document.getElementById('btn-reservar').style.display = 'none';
    document.getElementById('r-notas-grupo').style.display = 'none';
  } catch(e) {
    document.getElementById('msg-reserva').innerHTML = '<div class="mensaje error">Error de conexión, intenta de nuevo</div>';

}

function cerrarModal() {
  document.getElementById('modal-confirmacion').classList.remove('activo');
  cargarMisReservas();
}

async function cargarMisReservas() {
  if (!sesion) return;
  const lista = document.getElementById('mis-reservas-lista');
  if (lista) lista.innerHTML = '<p style="color:#666">Cargando...</p>';
  try {
    const res = await fetch(`${API}?accion=getReservas`);
    const data = await res.json();
    const misReservas = data.filter(r => String(r.Casa).toUpperCase().trim() === String(sesion.casa).toUpperCase().trim());
    if (!lista) return;
    if (misReservas.length === 0) {
      lista.innerHTML = '<p style="color:#666">No tienes reservas</p>';
      return;
    }
    lista.innerHTML = misReservas.map(r => {
      const esCancelada = r.Estatus === 'Cancelada';
      const esFinalizada = r.Estatus === 'Finalizada';
      const fechaLimpia = limpiarFecha(r.Fecha);
      return `
      <div class="card" style="border-left: 4px solid ${esCancelada ? '#c5221f' : esFinalizada ? '#999' : '#1a73e8'}">
        <strong>${r.Casa}</strong> — ${r.Nombre || ''}<br>
        <span style="color:#1a73e8">${r.ID_Amenidad}</span>${r.Duracion_Hrs ? ' — ' + r.Duracion_Hrs + ' hrs' : ''}<br>
        <small style="color:#666">📅 ${fechaLimpia}</small><br>
        <small style="color:#999">Estatus: ${r.Estatus}</small><br>
        ${!esCancelada && !esFinalizada ? `<button onclick="cancelar('${r.ID_Reserva}')" style="background:#c5221f;color:white;border:none;border-radius:6px;padding:8px 12px;margin-top:8px;cursor:pointer">Cancelar</button>` : ''}
      </div>`;
    }).join('');
  } catch(e) {
    if (lista) lista.innerHTML = '<p style="color:#c5221f">Error al cargar reservas</p>';
  }
}

// Estatus considerados "al corriente" (verde) vs "alerta" (rojo)
const ESTATUS_OK = ['OK', 'CONVENIO'];
const ESTATUS_ALERTA = ['ADEUDO', 'F. LUZ', 'F. MANTO'];

async function cargarFinanzas() {
  const lista = document.getElementById('finanzas-lista');
  lista.innerHTML = '<p style="color:#666">Cargando...</p>';
  try {
    const res = await fetch(`${API}?accion=getFinanzas`);
    const data = await res.json();
    const fin = obtenerFinanzasCasa(data);

    if (!fin) {
      lista.innerHTML = '<div class="mensaje ok">✅ Sin información financiera registrada</div>';
      return;
    }

    const estatus = String(fin.Estatus || '').trim().toUpperCase();
    const esOk = ESTATUS_OK.includes(estatus);

    // Residente: solo ve el estatus, sin montos ni desglose (privacidad financiera del propietario)
    if (sesion.rol === 'Residente') {
      lista.innerHTML = `
        <div class="semaforo ${esOk ? 'verde' : 'rojo'}">
          <div class="estatus-label">Estatus del mes</div>
          <div class="estatus-valor">${esOk ? '✅' : '⚠️'} ${fin.Estatus || 'Sin estatus'}</div>
        </div>
        ${!esOk ? `<p style="font-size:13px; color:#666; text-align:center; margin-top:8px">Por favor consulta con el propietario o la administración para más detalles.</p>` : ''}
      `;
      return;
    }

    const adeudo = limpiarMonto(fin.Adeudo);
    const abonado = limpiarMonto(fin.Abonado);
    const atrasado = limpiarMonto(fin.Monto_Atrasado);

    // Semáforo
    let html = `
      <div class="semaforo ${esOk ? 'verde' : 'rojo'}">
        <div class="estatus-label">Estatus de cuenta</div>
        <div class="estatus-valor">${esOk ? '✅' : '⚠️'} ${fin.Estatus || 'Sin estatus'}</div>
      </div>
      <div class="totales-finanzas">
        <div class="total-box adeudo">
          <div class="label">Adeudo total</div>
          <div class="valor">$${adeudo.toLocaleString('es-MX')}</div>
        </div>
        <div class="total-box abonado">
          <div class="label">Abonado</div>
          <div class="valor">$${abonado.toLocaleString('es-MX')}</div>
        </div>
      </div>
      ${atrasado > 0 ? `
      <div class="total-box atrasado" style="margin-bottom:16px">
        <div class="label">💵 Monto atrasado (cubierto)</div>
        <div class="valor">$${atrasado.toLocaleString('es-MX')}</div>
      </div>` : ''}
    `;

    // Desglose, ocultando conceptos en $0
    const conceptosConSaldo = CONCEPTOS_FINANZAS
      .map(c => ({ label: c.label, monto: limpiarMonto(fin[c.key]) }))
      .filter(c => c.monto !== 0);

    if (conceptosConSaldo.length > 0) {
      html += `<div class="desglose-titulo">Desglose por concepto</div>`;
      html += conceptosConSaldo.map(c => `
        <div class="finanzas-card">
          <div class="concepto">${c.label}</div>
          <div class="monto-item">$${c.monto.toLocaleString('es-MX')}</div>
        </div>
      `).join('');
    }

    lista.innerHTML = html;
  } catch(e) {
    lista.innerHTML = '<p style="color:#c5221f">Error al cargar finanzas</p>';
  }
}

// ===== SERVICIOS ADICIONALES =====
let serviciosData = [];
let estadoArticuloActual = null; // 'libre' o 'prestado'

function nombreReglaServicio(articulo) {
  if (articulo === 'Llave de Azotea') return 'Llave de Azotea';
  if (articulo === 'Escalera Comunitaria') return 'Escalera Comunitaria';
  return '';
}

async function onArticuloChange() {
  const articulo = document.getElementById('serv-articulo').value;
  const reglaBox = document.getElementById('regla-servicio-box');
  const estadoBox = document.getElementById('estado-servicio-box');
  const accionGrupo = document.getElementById('serv-accion-grupo');
  const btn = document.getElementById('btn-servicio');
  document.getElementById('msg-servicios').innerHTML = '';

  if (!articulo) {
    reglaBox.style.display = 'none';
    estadoBox.innerHTML = '';
    accionGrupo.style.display = 'none';
    btn.style.display = 'none';
    return;
  }

  // Mostrar regla dinámica desde el Sheet
  const regla = reglas.find(r => r.Amenidad === nombreReglaServicio(articulo));
  if (regla) {
    document.getElementById('regla-servicio-texto').textContent = regla.Regla;
    reglaBox.style.display = 'block';
  } else {
    reglaBox.style.display = 'none';
  }

  estadoBox.innerHTML = '<p style="color:#666; font-size:13px">Consultando disponibilidad...</p>';
  try {
    const res = await fetch(`${API}?accion=getServicios`);
    serviciosData = await res.json();
    const prestamoActivo = serviciosData.find(s =>
      String(s.Edificio) === String(sesion.edificio) &&
      s.Articulo === articulo &&
      s.Accion === 'Préstamo' &&
      s.Estatus === 'Activo'
    );

    if (prestamoActivo) {
      estadoArticuloActual = 'prestado';
      estadoBox.innerHTML = `<div class="mensaje error">⚠️ Actualmente prestado al depto ${prestamoActivo.Departamento} de tu edificio</div>`;
      // Solo permite Devolución si fue tu mismo depto quien lo tiene, si no, solo informa
      if (String(prestamoActivo.Departamento).toUpperCase() === String(sesion.casa).toUpperCase()) {
        accionGrupo.style.display = 'block';
        document.getElementById('serv-accion').innerHTML = '<option value="Devolución">Registrar Devolución</option>';
      } else {
        accionGrupo.style.display = 'none';
      }
    } else {
      estadoArticuloActual = 'libre';
      estadoBox.innerHTML = `<div class="mensaje ok">✅ Disponible en tu edificio</div>`;
      accionGrupo.style.display = 'block';
      document.getElementById('serv-accion').innerHTML = '<option value="Préstamo">Solicitar (Préstamo)</option>';
    }
    btn.style.display = accionGrupo.style.display === 'block' ? 'block' : 'none';
  } catch(e) {
    estadoBox.innerHTML = '<p style="color:#c5221f">Error al consultar disponibilidad</p>';
  }
}

async function registrarServicio() {
  const articulo = document.getElementById('serv-articulo').value;
  const accionServicio = document.getElementById('serv-accion').value;
  if (!articulo || !accionServicio) {
    document.getElementById('msg-servicios').innerHTML = '<div class="mensaje error">Selecciona el artículo y la acción</div>';
    return;
  }
  document.getElementById('msg-servicios').innerHTML = '<div class="mensaje ok">Procesando...</div>';
  try {
    await fetch(API, {
      method: 'POST', mode: 'no-cors',
      body: JSON.stringify({
        accion: 'registrarServicio',
        casa: sesion.casa,
        edificio: sesion.edificio,
        articulo,
        accion_servicio: accionServicio
      })
    });
    document.getElementById('msg-servicios').innerHTML = `<div class="mensaje ok">✅ ${accionServicio === 'Préstamo' ? 'Solicitud registrada' : 'Devolución registrada'} correctamente</div>`;

    onArticuloChange();
  } catch(e) {
    document.getElementById('msg-servicios').innerHTML = '<div class="mensaje error">Error de conexión, intenta de nuevo</div>';
  }
}

async function cancelar(id) {
  if (!confirm('¿Seguro que quieres cancelar esta reserva?')) return;
  try {
    await fetch(API, {
      method: 'POST', mode: 'no-cors',
      body: JSON.stringify({ accion: 'cancelarReserva', id_reserva: id })
    });
    setTimeout(() => cargarMisReservas(), 1500);
  } catch(e) {
    alert('Error al cancelar, intenta de nuevo');
  }
}
